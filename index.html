<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Targeted Rates Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:       #1f2e35;
      --bg:         #f4f0ef;
      --surface:    #ffffff;
      --border:     #ddddd8;
      --muted:      #5a5a52;
      --caption:    #888880;
      --sand:       #c8a84b;
      --waitarere:  #2e6e6e;
      --rangitikei: #3a6b3a;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Source Sans 3', sans-serif;
      background: var(--bg);
      color: var(--navy);
      font-size: 17px;
      line-height: 1.55;
      padding: 28px 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    /* ── INTRO BANNER ── */
    .intro {
      background: var(--surface);
      border-left: 4px solid var(--sand);
      border-radius: 0 4px 4px 0;
      padding: 13px 18px;
      font-size: 13.5px;
      color: var(--muted);
      line-height: 1.65;
    }

    /* ── SECTION LABEL ── */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--caption);
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    /* ── CARDS ── */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: start;
    }

    .card {
      background: var(--surface);
      border-radius: 6px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: box-shadow 0.18s ease;
    }

    .card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.09); }

    .card-accent { height: 6px; flex-shrink: 0; }
    .card--waitarere  .card-accent { background: var(--waitarere); }
    .card--rangitikei .card-accent { background: var(--rangitikei); }

    .card-body {
      padding: 26px 28px 22px 26px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-bottom: 2px;
    }
    .card--waitarere  .card-icon { background: #e0f0f0; color: var(--waitarere); }
    .card--rangitikei .card-icon { background: #e2f0e2; color: var(--rangitikei); }
    .card-icon svg { width: 24px; height: 24px; }

    .card-subtitle {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }
    .card--waitarere  .card-subtitle { color: var(--waitarere); }
    .card--rangitikei .card-subtitle { color: var(--rangitikei); }

    .card-title {
      font-family: 'Source Serif 4', serif;
      font-size: 1.35rem;
      font-weight: 600;
      line-height: 1.2;
      color: var(--navy);
    }

    .card-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.70;
    }

    /* ── FACTS GRID ── */
    .facts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 6px;
    }

    .fact {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 11px 14px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .fact-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      color: var(--caption);
    }

    .fact-value {
      font-size: 13.5px;
      font-weight: 600;
      color: var(--navy);
      line-height: 1.3;
    }

    /* ── CARD FOOTER ── */
    .card-footer {
      padding: 14px 26px 18px;
      border-top: 1px solid var(--border);
      background: #fafaf8;
    }

    .card-btn {
      padding: 10px 20px;
      background: var(--navy);
      color: #fff;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 13.5px;
      font-weight: 600;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: background 0.15s ease, transform 0.1s ease;
      letter-spacing: 0.02em;
    }

    .card-btn:hover { background: #2c3e47; transform: translateX(2px); }
    .card-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* ── FOOTER NOTE ── */
    .footer-note {
      font-size: 11.5px;
      color: var(--caption);
      text-align: center;
      padding-top: 8px;
